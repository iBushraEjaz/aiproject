<div class="register-wrapper">

  <!-- Left Side - Branding -->
  <div class="register-left">
    <div class="brand">
      <div class="brand-icon">
        <i class="bi bi-shield-check"></i>
      </div>
      <h1>SEOGEN AI</h1>
      <p>Backlink Analysis & Propaganda Detection Platform</p>
    </div>

    <div class="features-list">
      <div class="feature-item">
        <i class="bi bi-link-45deg"></i>
        <span>Backlink Analysis</span>
      </div>
      <div class="feature-item">
        <i class="bi bi-graph-up"></i>
        <span>Real vs Propaganda Detection</span>
      </div>
      <div class="feature-item">
        <i class="bi bi-shield-fill-check"></i>
        <span>Trust Score Analysis</span>
      </div>
      <div class="feature-item">
        <i class="bi bi-clock-history"></i>
        <span>Analysis History</span>
      </div>
    </div>
  </div>

  <!-- Right Side - Register Form -->
  <div class="register-right">
    <div class="register-card">
      <div class="register-header">
        <h2>Create Account</h2>
        <p>Join SEOGEN AI and start analyzing</p>
      </div>

      <!-- Error Message -->
      <div class="alert-error" *ngIf="errorMessage">
        <i class="bi bi-exclamation-circle"></i>
        {{ errorMessage }}
      </div>

      <!-- Register Form -->
      <form (ngSubmit)="onRegister()">

        <div class="form-group">
          <label>Full Name</label>
          <div class="input-wrapper">
            <i class="bi bi-person"></i>
            <input
              type="text"
              [(ngModel)]="name"
              name="name"
              placeholder="Enter your full name"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <i class="bi bi-envelope"></i>
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="Enter your email"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="bi bi-lock"></i>
            <input
              type="password"
              [(ngModel)]="password"
              name="password"
              placeholder="Create a password"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-wrapper">
            <i class="bi bi-lock-fill"></i>
            <input
              type="password"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              placeholder="Confirm your password"
              required
            />
          </div>
        </div>

        <button type="submit" class="btn-register" [disabled]="isLoading">
          <span *ngIf="!isLoading">
            <i class="bi bi-person-plus"></i> Create Account
          </span>
          <span *ngIf="isLoading">
            <i class="bi bi-arrow-repeat spin"></i> Creating...
          </span>
        </button>

      </form>

      <div class="register-footer">
        <p>Already have an account? <a routerLink="/login">Sign In</a></p>
      </div>
    </div>
  </div>

</div>
