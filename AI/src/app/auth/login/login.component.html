<!-- login.component.html -->
<div class="portal-wrap">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-logo-box">
       <img src="src/assets/logo.png" alt="SEO AI" class="header-logo-img">
        </div>
        <div class="brand-info">
          <span class="brand-name">SEO <em>AI</em></span>
          <span class="brand-sub">SEOGEN AI</span>
        </div>
      </div>
      <div class="portal-title">Back Link Analysis PORTAL</div>
      <div class="header-status">
        <span class="status-dot"></span>
        System Online
      </div>
    </div>
  </header>

  <!-- MAIN STAGE -->
  <main class="stage">

    <!-- Animated background -->
    <div class="stage-bg">
      <div class="bg-mesh"></div>
      <div class="orb o1"></div>
      <div class="orb o2"></div>
      <div class="orb o3"></div>
      <div class="grid-overlay"></div>
    </div>

    <!-- Floating feature cards (replacing wooden blocks) -->
    <div class="float-cards">
      <div class="fc fc1">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M3 17l4-8 4 4 4-6 4 10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Backlink Detection</span>
      </div>
      <div class="fc fc2">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/>
          <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span>Analytics</span>
      </div>
      <div class="fc fc3">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
          <path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span>Real-time</span>
      </div>
      <div class="fc fc4">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span>Clients</span>
      </div>
      <div class="fc fc5">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        </svg>
        <span>Targets</span>
      </div>
      <div class="fc fc6">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="3" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/>
          <path d="M8 21h8M12 17v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span>Dashboard</span>
      </div>
    </div>

    <!-- LOGIN CARD -->
    <div class="card-container">
      <div class="login-card">
        <div class="card-glow-line"></div>

        <!-- Avatar -->
        <div class="avatar-wrap">
          <div class="avatar-bg">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="8" r="4" stroke="white" stroke-width="1.7"/>
              <path d="M4 20c0-4 3.58-7 8-7s8 3 8 7" stroke="white" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="pulse-ring pr1"></div>
          <div class="pulse-ring pr2"></div>
        </div>

        <h2 class="card-title">Welcome Back</h2>
        <p class="card-sub">Sign in to access your portal</p>

        <!-- Error -->
        <div class="err-msg" *ngIf="errorMessage">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
            <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          {{ errorMessage }}
        </div>

        <form (ngSubmit)="onLogin()">

          <div class="input-field">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
              <rect x="2" y="4" width="20" height="16" rx="2.5" stroke="currentColor" stroke-width="1.7"/>
              <path d="M2 8l10 6 10-6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
            <input
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="Email"
              autocomplete="email"
            />
            <div class="input-bar"></div>
          </div>

          <div class="input-field">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.7"/>
              <path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            </svg>
            <input
              type="password"
              [(ngModel)]="password"
              name="password"
              placeholder="Password"
              autocomplete="current-password"
            />
            <div class="input-bar"></div>
          </div>

          <button type="submit" class="login-btn" [disabled]="isLoading">
            <span *ngIf="!isLoading" class="btn-label">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
                <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Login
            </span>
            <span *ngIf="isLoading" class="btn-label">
              <span class="spin"></span>
              Authenticating...
            </span>
            <div class="btn-ripple"></div>
          </button>
        </form>

      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <span>© SEOGEN AI: All rights reserved.</span>
    <span class="fsep">|</span>
  </footer>

</div>
